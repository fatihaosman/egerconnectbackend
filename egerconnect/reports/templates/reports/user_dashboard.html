<style>
/* HEADER */
.header {
    margin-bottom: 20px;
}

.header h1 {
    font-size: 26px;
    font-weight: 700;
    color: #222;
}

.header p {
    color: #777;
    font-size: 14px;
}

/* CARDS LAYOUT */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

/* CARD STYLE */
.card {
    background: #fff;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    transition: 0.3s;
    position: relative;
    overflow: hidden;
}

.card:hover {
    transform: translateY(-5px);
}

/* ICON */
.card i {
    font-size: 22px;
    margin-bottom: 10px;
    display: inline-block;
}

/* TITLES */
.card h3 {
    font-size: 14px;
    color: #888;
    margin-bottom: 5px;
}

/* VALUES */
.card p span {
    font-size: 24px;
    font-weight: bold;
    color: #222;
}

/* COLORS PER CARD */
.card.total {
    border-left: 5px solid #2196f3;
}

.card.growth {
    border-left: 5px solid #9c27b0;
}

.card.joined {
    border-left: 5px solid #4caf50;
}

/* OPTIONAL: growth color logic */
.card.growth span {
    color: #e53935; /* red for decrease */
}

/* CHART GRID */
.charts {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
    gap: 20px;

}

.chart-container {
    background: #fff;
    padding: 15px;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    height: 250px;   /* 👈 controls size */
    position: relative;
}


.positive span {
    color: #4caf50; /* green */
}

.negative span {
    color: #e53935; /* red */
}

.neutral span {
    color: #777;
}

</style>

<div class="header">
    <h1>User Analysis Report</h1>
    <p>Overview of user activity and growth</p>
</div>

<div class="cards">
    <!-- Total Users -->
    <div class="card total">
        <i class="fas fa-users"></i>
        <h3>Total Users</h3>
        <p><span>{{ total_users }}</span></p>
    </div>

    <!-- Monthly Growth -->
    <div class="card growth">
        <i class="fas fa-chart-line"></i>
        <h3>Growth this month: ({{ current_month_name }} {{ current_year }})</h3>
        <p><span class="{{ growth_class }}">{{ growth_label }}</span></p>
    </div>

    <!-- Yearly Growth -->
    <div class="card growth">
        <i class="fas fa-chart-bar"></i>
     <h3>Growth this year: ({{ current_year }})</h3>
        <p><span class="{{ yearly_growth_class }}">{{ yearly_growth_label }}</span></p>
    </div>
</div>

<div class="charts">
    <!-- Weekly -->
    <div class="chart-container">
        <canvas id="usersWeekChart"></canvas>
    </div>

    <!-- Monthly -->
    <div class="chart-container">
        <canvas id="usersMonthChart"></canvas>
    </div>
    <div class="chart-container">
        <canvas id="usersYearChart"></canvas>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
/* WEEKLY CHART */
new Chart(document.getElementById('usersWeekChart'), {
    type: 'bar',
    data: {
        labels: {{ week_labels|safe }},
        datasets: [{
            label: 'Users Joined (Weekly)',
            data: {{ week_counts|safe }},
            backgroundColor: 'rgba(33,150,243,0.7)',
        }]
    },
    options: {
        plugins: {
            title: {
                display: true,
               text: `Weekly Users ({{ current_month_name }} {{ current_year }})`
            }
        },
        scales: {
            y: { beginAtZero: true }
        }
    }
});

/* MONTHLY CHART */
new Chart(document.getElementById('usersMonthChart'), {
    type: 'bar',
    data: {
        labels: {{ month_labels|safe }},
        datasets: [{
            label: 'Users Joined (Year)',
            data: {{ monthly_counts|safe }},
            backgroundColor: 'rgba(255,193,7,0.7)',
        }]
    },
    options: {
        plugins: {
            title: {
                display: true,
                text: `Monthly Users ({{ current_year }})`
            }
        },
        scales: {
            y: { beginAtZero: true }
        }
    }
});


/* YEARLY CHART */
new Chart(document.getElementById('usersYearChart'), {
    type: 'line',
    data: {
        labels: {{ year_labels|safe }},
        datasets: [{
            label: 'Users Growth (Yearly)',
            data: {{ year_counts|safe }},
            borderColor: 'rgba(156,39,176,1)',
            backgroundColor: 'rgba(156,39,176,0.2)',
            tension: 0.4,
            fill: true
        }]
    },
    options: {
        plugins: {
            title: {
                display: true,
                text: `User Growth ({{ current_year|add:"-4" }}–{{ current_year }})`
            }
        },
        scales: {
            y: { beginAtZero: true }
        }
    }
});


</script>
